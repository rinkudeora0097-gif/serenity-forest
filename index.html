<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>Serenity Forest — Interactive Mental Wellness Sanctuary</title>
    
    <!-- PWA Configuration Meta Tags -->
    <meta name="theme-color" content="#2d5a27" />
    <meta name="description" content="Interactive mental wellness and mindfulness sanctuary" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Serenity Forest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Standard Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Performance preloads -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Advanced Performance Style Hints for Mobile rendering -->
    <style>
      /* Smooth behavior & GPU-layering for scroll containers */
      html {
        scroll-behavior: smooth;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Avoid layout shifting & minimize paint work for sections far below fold */
      #mood-section,
      #benefits-section,
      #founder-section,
      #download-section,
      #faq-section-anchor,
      #contact-section {
        content-visibility: auto;
        contain-intrinsic-size: 0 500px;
      }
    </style>
  </head>
  <body class="bg-beige-50 dark:bg-stone-950 text-forest-800 dark:text-stone-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
